name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR), but never
# on the trunk — every commit on main should get a completed gate run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Job id `gate` is the status-check context (`CI / gate`) — the check the README
  # tells you to require in branch protection. Don't add a `name:` override here
  # without updating that note.
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync workspace (locked deps + dev tools)
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest (with coverage)
        run: uv run pytest --cov

      # SPC coverage gate: the testable SPC surface (engine, simulation logic,
      # figure builders) must stay highly covered so it can't regress silently.
      # The Streamlit `pages/` are excluded — they need a runtime to exercise —
      # mirroring how the FMEA bar covers fmea_app/ but not its entry scripts.
      - name: SPC coverage gate
        run: >
          uv run pytest apps/spc
          --cov=spc_app.spc_engine
          --cov=spc_app.simulation
          --cov=spc_app.visualizer
          --cov-report=term-missing
          --cov-fail-under=95
