[mypy]
python_version = 3.11
ignore_missing_imports = True

# One type-checking bar for the workspace: the shared core, the platform shell,
# and each app's typed library package (matching the FMEA bar, which checked
# fmea_app/ + ui/ only, not its Streamlit entry scripts or tests). The shell loads
# the FMEA body dynamically (importlib), so it has no static `import fmea_app` to
# resolve. Listing the library packages by path also keeps the duplicate top-level
# module names the apps share (`app`, `tests`) out of scope.
#
# spc_app joined the gate in W02-1 (SPC mypy parity); its thin Streamlit entry
# scripts (apps/spc/app.py, apps/spc/pages/) stay out, matching FMEA.
files =
    packages/quality-core/src/quality_core,
    apps/fmea/fmea_app,
    apps/fmea/ui,
    apps/spc/spc_app,
    shell,
    app.py

[mypy-plotly.*]
ignore_missing_imports = True
