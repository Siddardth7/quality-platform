name: CI

on:
  push:
    branches: [main, dev, test]
  pull_request:
    branches: [main, dev, test]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR), but never
# on the trunk — every commit on main should get a completed gate run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Job id `gate` is the status-check context (`CI / gate`) — the check the README
  # tells you to require in branch protection. Don't add a `name:` override here
  # without updating that note.
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync workspace (locked deps + dev tools)
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest (with coverage)
        run: uv run pytest --cov

      # Core io coverage gate: quality_core.io (shared export + validated ingest)
      # is used by every tool, so it must be fully covered by its OWN tests — not
      # only incidentally via the app suites. Held at 100% from packages/quality-core.
      - name: Core io coverage gate
        run: >
          uv run pytest packages/quality-core
          --cov=quality_core.io
          --cov-report=term-missing
          --cov-fail-under=100

      # Core schema coverage gate: quality_core.schema holds the shared FMEA
      # row/dataset contracts (W05-1), promoted out of the FMEA app so every tool
      # shares one schema. Like io, it must be fully covered by its OWN tests, not
      # only incidentally via the FMEA suite. Held at 100% from packages/quality-core.
      - name: Core schema coverage gate
        run: >
          uv run pytest packages/quality-core
          --cov=quality_core.schema
          --cov-report=term-missing
          --cov-fail-under=100

      # Core scoring coverage gate: quality_core.scoring holds the shared scalar
      # risk scorers (RPN + the AIAG-VDA Action Priority table, promoted W05-3a),
      # used by FMEA and the future action-effectiveness model. A standards table
      # must be fully covered by its OWN tests. Held at 100% from packages/quality-core.
      - name: Core scoring coverage gate
        run: >
          uv run pytest packages/quality-core
          --cov=quality_core.scoring
          --cov-report=term-missing
          --cov-fail-under=100

      # SPC coverage gate: the testable SPC surface (engine, simulation logic,
      # figure builders, report exporter) must stay highly covered so it can't
      # regress silently. The Streamlit `pages/` are excluded — they need a
      # runtime to exercise — mirroring how the FMEA bar covers fmea_app/ but not
      # its entry scripts.
      - name: SPC coverage gate
        run: >
          uv run pytest apps/spc
          --cov=spc_app.spc_engine
          --cov=spc_app.simulation
          --cov=spc_app.visualizer
          --cov=spc_app.exporter
          --cov=spc_app.schema
          --cov=spc_app.control_plan_config
          --cov-report=term-missing
          --cov-fail-under=95

      # Control Plan coverage gate: the FMEA→Control Plan connector engine (W06-2)
      # and the validated Control Plan ingest schema (W06-1) are new testable surface
      # and must stay fully covered so the mapping/rule-table and rejection paths can't
      # regress silently. The Streamlit pages/ and the exporter are excluded here —
      # mirroring how the SPC bar covers the engine surface but not its entry scripts.
      # branch coverage is inherited from [tool.coverage.run] branch=true in pyproject.
      - name: Control Plan coverage gate
        run: >
          uv run pytest apps/controlplan
          --cov=controlplan_app.connector
          --cov=controlplan_app.schema
          --cov-report=term-missing
          --cov-fail-under=100
