[mypy]
python_version = 3.11
ignore_missing_imports = True

# One type-checking bar for the workspace. `files` scopes mypy to the typed
# library packages (matching the FMEA bar, which checked fmea_app/ + ui/ only,
# not the Streamlit entry scripts or tests). This also avoids the duplicate
# top-level module names the apps share (`app`, `tests`).
#
# spc_app is added in W02-2; until then it has known arg-type errors and is
# intentionally left out of `files`.
files =
    packages/quality-core/src/quality_core,
    apps/fmea/fmea_app,
    apps/fmea/ui

[mypy-plotly.*]
ignore_missing_imports = True
