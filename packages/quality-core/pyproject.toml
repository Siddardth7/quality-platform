[project]
name = "quality-core"
version = "0.1.0"
description = "Shared core for the Quality Platform: schema, IO, theme, and domain primitives."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=3.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quality_core"]
