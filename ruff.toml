# One ruff config for the whole monorepo (ported from the FMEA app).
# quality-core + the FMEA app are linted against the same bar.
target-version = "py311"
line-length = 100

extend-exclude = [".venv", "**/__pycache__"]

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — handled by formatter
    "F401",  # unused import — some are re-exports
]

[lint.per-file-ignores]
"**/tests/**" = ["F811"]  # allow redefinition in tests

# The apps are not installed (package = false) and live under apps/*, so ruff's
# isort cannot auto-detect their top-level packages as first-party. Declare them
# so import groups match how each app is written. quality-core is intentionally
# omitted: it is an installed (editable) workspace package, so both apps already
# import it as a third-party dependency — listing it here would churn their
# existing import blocks.
[lint.isort]
known-first-party = ["fmea_app", "ui", "spc_app", "shell"]
