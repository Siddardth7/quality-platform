[project]
name = "quality-core"
version = "0.5.0"
description = "Shared core for the Quality Platform: schema, IO, theme, and domain primitives."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=3.0.2",
    "pydantic>=2.13.4",
    "streamlit>=1.56.0",  # quality_core.theme.style.apply_theme injects CSS via st.markdown
    "openpyxl>=3.1.5",    # quality_core.io.export/validate read & write .xlsx via pandas
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quality_core"]
